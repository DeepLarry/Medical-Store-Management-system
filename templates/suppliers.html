{% extends "layout.html" %}

{% block content %}
<div class="inventory-header"
    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h2><i class="fas fa-truck"></i> Suppliers</h2>
    <button class="btn-primary" onclick="openModal('addSupplierModal')">
        <i class="fas fa-plus"></i> Add Supplier
    </button>
</div>

<div class="table-card">
    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Contact</th>
                <th>City</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for supplier in suppliers %}
            <tr>
                <td>#{{ supplier.supplier_id }}</td>
                <td>{{ supplier.supplier_name }}</td>
                <td>{{ supplier.phone }}</td>
                <td>{{ supplier.city }}</td>
                <td>
                    <button class="btn-icon delete" onclick="deleteSupplier({{ supplier.supplier_id }})"><i
                            class="fas fa-trash"></i></button>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5">No suppliers found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Add Supplier Modal -->
<div id="addSupplierModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('addSupplierModal')">&times;</span>
        <h3>Add New Supplier</h3>
        <form action="{{ url_for('inventory.add_supplier') }}" method="POST">
            <div class="form-group">
                <label>Supplier Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Phone Contact</label>
                <input type="text" name="phone" required>
            </div>
            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" required>
            </div>
            <button type="submit" class="btn-submit">Add Supplier</button>
        </form>
    </div>
</div>

<style>
    /* Reusing modal styles from previous pages (should ideally be in css) */
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
        background-color: var(--card-bg);
        margin: 10% auto;
        padding: 20px;
        border: 1px solid var(--border-color);
        width: 40%;
        border-radius: var(--card-radius);
    }

    .close {
        color: var(--text-secondary);
        float: right;
        font-size: 28px;
        cursor: pointer;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        background: var(--bg-dark);
        border: 1px solid var(--border-color);
        color: white;
    }

    .btn-submit {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        background: var(--primary-color);
        color: white;
        border: none;
        cursor: pointer;
    }
</style>

<script>
    function openModal(id) { document.getElementById(id).style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }
    function deleteSupplier(id) {
        if (confirm('Delete this supplier?')) {
            fetch(`/delete_supplier/${id}`, { method: 'DELETE' }) // Changed to DELETE method for correct semantics
                .then(res => res.json())
                .then(data => {
                    if (data.success) location.reload();
                    else alert('Error deleting supplier');
                });
        }
    }
</script>
{% endblock %}
